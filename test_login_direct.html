<!DOCTYPE html>
<html>
<head>
    <title>直接测试登录</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; }
        .test-container { max-width: 400px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 10px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2980b9; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>登录功能测试</h1>
        
        <input type="password" id="testPassword" placeholder="输入测试口令" style="width: 100%; padding: 10px; margin: 10px 0;">
        <br>
        
        <button onclick="testLogin()">测试登录API</button>
        <button onclick="testButtonClick()">测试按钮点击事件</button>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');
        const testPassword = document.getElementById('testPassword');
        
        function log(msg) {
            resultDiv.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
            console.log(msg);
        }
        
        // 测试登录API
        async function testLogin() {
            log('开始测试登录API...');
            const password = testPassword.value.trim();
            
            if (!password) {
                log('请输入测试口令');
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                
                log('响应状态:', response.status);
                const data = await response.json();
                log('响应数据:', JSON.stringify(data));
                
                if (data.success) {
                    log('登录成功！');
                } else {
                    log('登录失败:', data.error);
                }
                
            } catch (error) {
                log('网络错误:', error);
            }
        }
        
        // 测试按钮点击事件
        function testButtonClick() {
            log('测试按钮点击事件...');
            
            // 创建一个模拟的登录按钮
            const testButton = document.createElement('button');
            testButton.textContent = '模拟登录按钮';
            testButton.style.marginTop = '10px';
            
            testButton.addEventListener('click', () => {
                log('模拟登录按钮被点击');
                testLogin();
            });
            
            document.querySelector('.test-container').appendChild(testButton);
            log('模拟登录按钮已创建并绑定点击事件');
        }
        
        log('页面加载完成，测试脚本已就绪');
    </script>
</body>
</html>
