<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录按钮测试</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); width: 400px; margin: 0 auto; }
        .login-button { padding: 15px 40px; background-color: #3498db; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background-color 0.3s; width: 280px; }
        .login-button:hover { background-color: #2980b9; }
        .debug-info { background: #f0f0f0; padding: 10px; margin-top: 20px; text-align: left; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>旅行者-荧</h2>
        <p>请输入访问口令</p>
        <input type="password" id="passwordInput" placeholder="输入口令..." style="width: 280px; padding: 12px; margin: 10px 0; border: 2px solid #e9ecef; border-radius: 25px;">
        <br>
        <button class="login-button" id="loginButton">登录</button>
        <div id="loginStatus"></div>
    </div>
    
    <div class="debug-info" id="debugInfo"></div>

    <script>
        const passwordInput = document.getElementById('passwordInput');
        const loginButton = document.getElementById('loginButton');
        const loginStatus = document.getElementById('loginStatus');
        const debugInfo = document.getElementById('debugInfo');
        
        function log(message) {
            debugInfo.innerHTML += new Date().toLocaleTimeString() + ': ' + message + '<br>';
            console.log(message);
        }
        
        log('页面加载完成');
        log('loginButton:', loginButton);
        log('passwordInput:', passwordInput);
        
        // 测试按钮是否可点击
        loginButton.addEventListener('click', () => {
            log('登录按钮被点击');
            const password = passwordInput.value.trim();
            log('输入的密码:', password ? '已提供' : '空');
            
            if (!password) {
                loginStatus.textContent = '请输入口令';
                loginStatus.style.color = 'red';
                return;
            }
            
            loginStatus.textContent = '正在登录...';
            loginStatus.style.color = 'blue';
            
            // 模拟登录请求
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            })
            .then(response => {
                log('响应状态:', response.status);
                return response.json();
            })
            .then(data => {
                log('登录响应:', data);
                if (data.success) {
                    loginStatus.textContent = '登录成功！';
                    loginStatus.style.color = 'green';
                } else {
                    loginStatus.textContent = data.error || '登录失败';
                    loginStatus.style.color = 'red';
                }
            })
            .catch(error => {
                log('登录错误:', error);
                loginStatus.textContent = '网络错误';
                loginStatus.style.color = 'red';
            });
        });
        
        // 测试按钮是否在DOM中
        if (loginButton) {
            log('登录按钮存在于DOM中');
            log('按钮类型:', loginButton.tagName);
            log('按钮类名:', loginButton.className);
            log('按钮ID:', loginButton.id);
            log('按钮文本:', loginButton.textContent);
        } else {
            log('登录按钮不存在于DOM中');
        }
    </script>
</body>
</html>
