<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 0; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .login-title { font-size: 24px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        .login-subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 30px; }
        .login-input { width: 100%; padding: 12px; border: 2px solid #3498db; border-radius: 8px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        .login-button { padding: 15px 40px; background-color: #3498db; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background-color 0.3s; }
        .login-button:hover { background-color: #2980b9; }
        .login-status { margin-top: 15px; font-size: 14px; }
        .login-status.success { color: #27ae60; }
        .login-status.error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <div class="login-title">旅行者-荧</div>
            <div class="login-subtitle">请输入访问口令</div>
            <input type="password" class="login-input" id="passwordInput" placeholder="输入口令..." autocomplete="off">
            <button class="login-button" id="loginButton">登录</button>
            <div class="login-status" id="loginStatus"></div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const passwordInput = document.getElementById('passwordInput');
        const loginButton = document.getElementById('loginButton');
        const loginStatus = document.getElementById('loginStatus');
        const loginContainer = document.getElementById('loginContainer');
        let currentPassword = null;

        // 登录函数
        async function login(password) {
            try {
                console.log('登录请求:', { password: password ? '已提供' : '空' });
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();
                console.log('登录响应:', data);
                
                if (data.success) {
                    currentPassword = password;
                    localStorage.setItem('savedPassword', password);
                    loginStatus.textContent = '登录成功！';
                    loginStatus.className = 'login-status success';
                    loginContainer.classList.add('hidden');
                    return true;
                } else {
                    loginStatus.textContent = data.error || '登录失败，请重试';
                    loginStatus.className = 'login-status error';
                    return false;
                }
            } catch (error) {
                console.error('登录失败:', error);
                loginStatus.textContent = '网络错误，请重试';
                loginStatus.className = 'login-status error';
                return false;
            }
        }

        // 登录按钮点击事件
        loginButton.addEventListener('click', () => {
            const password = passwordInput.value.trim();
            if (!password) {
                loginStatus.textContent = '请输入口令';
                loginStatus.className = 'login-status error';
                return;
            }
            login(password);
        });

        // 输入框回车事件
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const password = passwordInput.value.trim();
                if (password) {
                    login(password);
                }
            }
        });
    </script>
</body>
</html>
