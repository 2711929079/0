<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .login-box { max-width: 300px; margin: 0 auto; }
        .login-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        input { padding: 10px; width: 100%; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; cursor: pointer; }
        button:hover { background: #2980b9; }
        .status { margin-top: 10px; color: #666; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-title">旅行者与派蒙</div>
        <input type="password" id="passwordInput" placeholder="输入口令..." autocomplete="off">
        <button id="loginButton">登录</button>
        <div class="status" id="loginStatus"></div>
    </div>

    <script>
        console.log('页面加载完成');
        
        const loginButton = document.getElementById('loginButton');
        const passwordInput = document.getElementById('passwordInput');
        const loginStatus = document.getElementById('loginStatus');
        
        console.log('loginButton:', loginButton);
        console.log('passwordInput:', passwordInput);
        
        function handleLogin() {
            console.log('登录按钮被点击');
            const password = passwordInput.value.trim();
            console.log('输入的密码:', password);
            
            if (!password) {
                loginStatus.textContent = '请输入口令';
                loginStatus.style.color = 'red';
                return;
            }
            
            loginStatus.textContent = '登录中...';
            loginStatus.style.color = 'blue';
            
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            })
            .then(response => response.json())
            .then(data => {
                console.log('登录响应:', data);
                if (data.success) {
                    loginStatus.textContent = '登录成功！';
                    loginStatus.style.color = 'green';
                } else {
                    loginStatus.textContent = data.error || '登录失败';
                    loginStatus.style.color = 'red';
                }
            })
            .catch(error => {
                console.error('登录失败:', error);
                loginStatus.textContent = '网络错误';
                loginStatus.style.color = 'red';
            });
        }
        
        // 绑定按钮点击事件
        if (loginButton) {
            console.log('绑定登录按钮点击事件');
            loginButton.addEventListener('click', handleLogin);
            console.log('事件绑定完成');
        } else {
            console.error('登录按钮不存在');
        }
        
        // 绑定回车事件
        if (passwordInput) {
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    console.log('按下Enter键');
                    handleLogin();
                }
            });
        }
    </script>
</body>
</html>
