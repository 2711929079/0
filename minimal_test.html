<!DOCTYPE html>
<html>
<head>
    <title>极简登录测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; }
        .login-form { max-width: 300px; margin: 0 auto; }
        .login-button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .login-button:hover { background: #2980b9; }
        #status { margin-top: 20px; color: red; }
        #debug { margin-top: 20px; padding: 10px; background: #f5f5f5; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="login-form">
        <h2>登录测试</h2>
        <input type="password" id="password" placeholder="输入口令" style="width: 100%; padding: 10px; margin: 10px 0;">
        <br>
        <button class="login-button" id="loginBtn">登录</button>
        <div id="status"></div>
        <div id="debug"></div>
    </div>
    
    <script>
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        
        function log(msg) {
            debug.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
            console.log(msg);
        }
        
        log('页面加载完成');
        log('loginBtn:', loginBtn);
        log('passwordInput:', passwordInput);
        
        loginBtn.addEventListener('click', async function() {
            log('登录按钮被点击');
            const password = passwordInput.value.trim();
            log('密码:', password);
            
            if (!password) {
                status.textContent = '请输入口令';
                return;
            }
            
            status.textContent = '登录中...';
            
            try {
                log('发送登录请求');
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                
                log('响应状态:', response.status);
                const data = await response.json();
                log('响应数据:', JSON.stringify(data));
                
                if (data.success) {
                    status.textContent = '登录成功！';
                    status.style.color = 'green';
                } else {
                    status.textContent = data.error || '登录失败';
                    status.style.color = 'red';
                }
            } catch (error) {
                log('错误:', error);
                status.textContent = '网络错误';
                status.style.color = 'red';
            }
        });
        
        // 测试按钮是否可点击
        log('按钮样式:', window.getComputedStyle(loginBtn));
        log('按钮disabled属性:', loginBtn.disabled);
        log('按钮pointer-events:', loginBtn.style.pointerEvents);
    </script>
</body>
</html>
