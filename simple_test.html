<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单登录测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-box { background: #f0f0f0; padding: 20px; margin: 20px 0; border-radius: 10px; }
        .login-button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .login-button:hover { background: #2980b9; }
        .debug { font-family: monospace; font-size: 12px; background: #000; color: #0f0; padding: 10px; margin-top: 20px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>登录按钮测试</h1>
    
    <div class="test-box">
        <input type="password" id="passwordInput" placeholder="输入口令..." style="padding: 8px; margin: 10px 0;">
        <br>
        <button class="login-button" id="loginButton">登录</button>
        <div id="status"></div>
    </div>
    
    <div class="debug" id="debug"></div>

    <script>
        const passwordInput = document.getElementById('passwordInput');
        const loginButton = document.getElementById('loginButton');
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        
        function log(msg) {
            debug.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
            console.log(msg);
        }
        
        log('页面加载完成');
        log('loginButton:', loginButton);
        log('passwordInput:', passwordInput);
        
        // 测试按钮是否存在
        if (loginButton) {
            log('登录按钮存在');
            
            // 绑定点击事件
            loginButton.addEventListener('click', function() {
                log('登录按钮被点击');
                const password = passwordInput.value.trim();
                log('密码:', password ? '已输入' : '空');
                
                if (!password) {
                    status.textContent = '请输入口令';
                    status.style.color = 'red';
                    return;
                }
                
                status.textContent = '登录中...';
                status.style.color = 'blue';
                
                // 测试fetch请求
                fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                })
                .then(response => {
                    log('响应状态:', response.status);
                    return response.json();
                })
                .then(data => {
                    log('响应数据:', JSON.stringify(data));
                    if (data.success) {
                        status.textContent = '登录成功！';
                        status.style.color = 'green';
                    } else {
                        status.textContent = data.error || '登录失败';
                        status.style.color = 'red';
                    }
                })
                .catch(error => {
                    log('错误:', error);
                    status.textContent = '网络错误';
                    status.style.color = 'red';
                });
            });
            
            log('点击事件已绑定');
        } else {
            log('登录按钮不存在');
        }
        
        // 测试键盘事件
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                log('回车键被按下');
                loginButton.click();
            }
        });
        log('回车键事件已绑定');
    </script>
</body>
</html>
