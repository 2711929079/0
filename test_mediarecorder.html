<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaRecorder API测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 3px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <h1>MediaRecorder API 兼容性测试</h1>
    
    <div class="test-section">
        <h2>1. 浏览器支持检测</h2>
        <button onclick="checkBrowserSupport()">检测浏览器支持</button>
        <div id="browserSupportResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 麦克风权限测试</h2>
        <button onclick="testMicrophonePermission()">测试麦克风权限</button>
        <div id="micPermissionResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. MediaRecorder功能测试</h2>
        <button onclick="testMediaRecorder()">测试MediaRecorder</button>
        <div id="mediaRecorderResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 完整录音测试</h2>
        <button onclick="startRecording()" id="recordBtn">开始录音</button>
        <button onclick="stopRecording()" id="stopBtn" disabled>停止录音</button>
        <div id="recordingResult" class="result"></div>
        <audio id="audioPreview" controls style="margin-top: 10px; display: none;"></audio>
    </div>
    
    <div class="test-section">
        <h2>5. 浏览器信息</h2>
        <div id="browserInfo" class="result info"></div>
    </div>

    <script>
        let mediaRecorder = null;
        let audioChunks = [];
        let stream = null;
        
        // 显示浏览器信息
        function showBrowserInfo() {
            const info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                wechat: navigator.userAgent.includes('MicroMessenger'),
                chrome: navigator.userAgent.includes('Chrome'),
                safari: navigator.userAgent.includes('Safari') && !navigator.userAgent.includes('Chrome'),
                firefox: navigator.userAgent.includes('Firefox'),
                edge: navigator.userAgent.includes('Edg'),
                android: navigator.userAgent.includes('Android'),
                ios: /iPhone|iPad|iPod/.test(navigator.userAgent)
            };
            
            let infoHtml = '<strong>浏览器信息：</strong><br>';
            infoHtml += `User Agent: ${info.userAgent}<br>`;
            infoHtml += `平台: ${info.platform}<br>`;
            infoHtml += `语言: ${info.language}<br>`;
            infoHtml += `微信: ${info.wechat ? '是' : '否'}<br>`;
            infoHtml += `Chrome: ${info.chrome ? '是' : '否'}<br>`;
            infoHtml += `Safari: ${info.safari ? '是' : '否'}<br>`;
            infoHtml += `Firefox: ${info.firefox ? '是' : '否'}<br>`;
            infoHtml += `Edge: ${info.edge ? '是' : '否'}<br>`;
            infoHtml += `Android: ${info.android ? '是' : '否'}<br>`;
            infoHtml += `iOS: ${info.ios ? '是' : '否'}`;
            
            document.getElementById('browserInfo').innerHTML = infoHtml;
        }
        
        // 检测浏览器支持
        function checkBrowserSupport() {
            const resultDiv = document.getElementById('browserSupportResult');
            
            const hasMediaDevices = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
            const hasMediaRecorder = typeof MediaRecorder !== 'undefined';
            
            let html = '';
            
            if (hasMediaDevices) {
                html += '<span class="success">✓ navigator.mediaDevices 支持</span><br>';
            } else {
                html += '<span class="error">✗ navigator.mediaDevices 不支持</span><br>';
            }
            
            if (hasMediaRecorder) {
                html += '<span class="success">✓ MediaRecorder API 支持</span><br>';
            } else {
                html += '<span class="error">✗ MediaRecorder API 不支持</span><br>';
            }
            
            // 检查支持的MIME类型
            if (hasMediaRecorder) {
                const supportedMimeTypes = [
                    'audio/webm',
                    'audio/ogg',
                    'audio/wav',
                    'audio/mp4',
                    'audio/mp3'
                ];
                
                html += '<br><strong>支持的音频格式：</strong><br>';
                supportedMimeTypes.forEach(mime => {
                    if (MediaRecorder.isTypeSupported(mime)) {
                        html += `<span class="success">✓ ${mime}</span><br>`;
                    } else {
                        html += `<span class="error">✗ ${mime}</span><br>`;
                    }
                });
            }
            
            resultDiv.innerHTML = html;
        }
        
        // 测试麦克风权限
        async function testMicrophonePermission() {
            const resultDiv = document.getElementById('micPermissionResult');
            
            try {
                resultDiv.innerHTML = '<span class="info">正在请求麦克风权限...</span>';
                
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                resultDiv.innerHTML = '<span class="success">✓ 麦克风权限获取成功</span>';
                
                // 停止所有轨道
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                
            } catch (error) {
                let errorMsg = '';
                if (error.name === 'NotAllowedError') {
                    errorMsg = '用户拒绝了麦克风权限';
                } else if (error.name === 'NotFoundError') {
                    errorMsg = '未找到可用的麦克风设备';
                } else {
                    errorMsg = error.message;
                }
                
                resultDiv.innerHTML = `<span class="error">✗ 麦克风权限获取失败: ${errorMsg}</span>`;
            }
        }
        
        // 获取浏览器支持的音频格式（带编解码器）
        function getSupportedAudioFormat() {
            const formats = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/ogg;codecs=vorbis',
                'audio/ogg',
                'audio/wav',
                'audio/mp4'
            ];
            
            for (const format of formats) {
                if (MediaRecorder.isTypeSupported(format)) {
                    return format;
                }
            }
            
            // 如果没有支持的格式，使用默认格式
            return 'audio/webm';
        }
        
        // 测试MediaRecorder
        async function testMediaRecorder() {
            const resultDiv = document.getElementById('mediaRecorderResult');
            
            try {
                resultDiv.innerHTML = '<span class="info">正在测试MediaRecorder...</span>';
                
                // 获取麦克风流
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 获取浏览器支持的音频格式
                const mimeType = getSupportedAudioFormat();
                
                // 创建MediaRecorder
                mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
                
                resultDiv.innerHTML = `<span class="success">✓ MediaRecorder创建成功，使用格式: ${mimeType}</span>`;
                
                // 清理
                mediaRecorder = null;
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ MediaRecorder测试失败: ${error.message}</span>`;
            }
        }
        
        // 开始录音
        async function startRecording() {
            const resultDiv = document.getElementById('recordingResult');
            const recordBtn = document.getElementById('recordBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            try {
                resultDiv.innerHTML = '<span class="info">正在获取麦克风权限...</span>';
                
                // 获取麦克风流
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 获取浏览器支持的音频格式
                const mimeType = getSupportedAudioFormat();
                
                mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = function(event) {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = function() {
                    console.log('录音停止，收集到的音频块数量:', audioChunks.length);
                    
                    if (audioChunks.length === 0) {
                        resultDiv.innerHTML = `<span class="error">✗ 录音失败: 未收集到音频数据</span>`;
                        return;
                    }
                    
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    console.log('音频Blob大小:', audioBlob.size, '字节');
                    console.log('音频格式:', mimeType);
                    
                    if (audioBlob.size < 100) {
                        resultDiv.innerHTML = `<span class="error">✗ 录音失败: 音频数据过小</span>`;
                        return;
                    }
                    
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    // 创建下载链接
                    const downloadLink = document.createElement('a');
                    downloadLink.href = audioUrl;
                    downloadLink.download = `recording_${new Date().getTime()}.${mimeType.split('/')[1].split(';')[0]}`;
                    downloadLink.textContent = '下载录音文件';
                    downloadLink.style.display = 'block';
                    downloadLink.style.marginTop = '10px';
                    
                    // 尝试播放（如果失败则隐藏播放器）
                    const audioPreview = document.getElementById('audioPreview');
                    audioPreview.src = audioUrl;
                    audioPreview.style.display = 'block';
                    
                    // 添加加载事件监听器
                    let loaded = false;
                    audioPreview.addEventListener('loadedmetadata', function() {
                        loaded = true;
                        console.log('音频时长:', audioPreview.duration, '秒');
                        if (audioPreview.duration > 0) {
                            resultDiv.innerHTML = `<span class="success">✓ 录音完成，时长: ${audioPreview.duration.toFixed(2)}秒 (格式: ${mimeType})</span>`;
                        } else {
                            resultDiv.innerHTML = `<span class="error">✗ 音频时长为0，可能格式不兼容</span>`;
                        }
                        resultDiv.appendChild(downloadLink);
                    });
                    
                    audioPreview.addEventListener('error', function() {
                        if (!loaded) {
                            resultDiv.innerHTML = `<span class="error">✗ 音频播放失败，可能格式不兼容</span>`;
                            audioPreview.style.display = 'none';
                        }
                        resultDiv.appendChild(downloadLink);
                    });
                    
                    // 自动发送到服务器进行识别
                    setTimeout(function() {
                        sendToServer(audioBlob, mimeType);
                    }, 1000);
                    
                    // 超时处理
                    setTimeout(function() {
                        if (!loaded) {
                            resultDiv.innerHTML = `<span class="error">✗ 音频加载超时，可能格式不兼容</span>`;
                            audioPreview.style.display = 'none';
                            resultDiv.appendChild(downloadLink);
                        }
                    }, 3000);
                };
                
                mediaRecorder.start();
                
                resultDiv.innerHTML = `<span class="success">✓ 录音已开始，点击停止按钮结束 (格式: ${mimeType})</span>`;
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ 录音失败: ${error.message}</span>`;
            }
        }
        
        // 停止录音
        function stopRecording() {
            const recordBtn = document.getElementById('recordBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                
                // 停止麦克风流
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
                
                recordBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }
        
        // 发送音频到服务器进行识别
        async function sendToServer(audioBlob, mimeType) {
            const resultDiv = document.getElementById('recordingResult');
            resultDiv.innerHTML += '<br><span class="info">正在发送到服务器进行识别...</span>';
            
            try {
                const formData = new FormData();
                formData.append('audio', audioBlob, `recording.${mimeType.split('/')[1].split(';')[0]}`);
                
                const response = await fetch('/api/speech_recognition', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML += `<br><span class="success">✓ 识别成功: ${result.transcript}</span>`;
                } else {
                    resultDiv.innerHTML += `<br><span class="error">✗ 识别失败: ${result.error}</span>`;
                }
                
            } catch (error) {
                resultDiv.innerHTML += `<br><span class="error">✗ 发送失败: ${error.message}</span>`;
            }
        }
        
        // 页面加载时显示浏览器信息
        window.addEventListener('load', function() {
            showBrowserInfo();
        });
    </script>
</body>
</html>
