<!DOCTYPE html>
<html>
<head>
    <title>极简登录测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; }
        .login-box { max-width: 300px; margin: 0 auto; }
        .login-button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .login-button:hover { background: #2980b9; }
        .status { margin-top: 10px; color: red; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>登录测试</h2>
        <input type="password" id="password" placeholder="输入口令" style="width: 100%; padding: 10px; margin: 10px 0;">
        <br>
        <button class="login-button" id="loginBtn">登录</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        console.log('页面加载完成');
        
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const status = document.getElementById('status');
        
        console.log('loginBtn:', loginBtn);
        console.log('passwordInput:', passwordInput);
        
        if (loginBtn) {
            console.log('登录按钮存在，绑定点击事件');
            loginBtn.addEventListener('click', function() {
                console.log('登录按钮被点击');
                const password = passwordInput.value.trim();
                console.log('密码:', password);
                
                if (!password) {
                    status.textContent = '请输入口令';
                    status.style.color = 'red';
                    return;
                }
                
                status.textContent = '登录中...';
                status.style.color = 'blue';
                
                // 测试登录API
                fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                })
                .then(response => response.json())
                .then(data => {
                    console.log('登录响应:', data);
                    if (data.success) {
                        status.textContent = '登录成功！';
                        status.style.color = 'green';
                    } else {
                        status.textContent = data.error || '登录失败';
                        status.style.color = 'red';
                    }
                })
                .catch(error => {
                    console.error('错误:', error);
                    status.textContent = '网络错误';
                    status.style.color = 'red';
                });
            });
            console.log('点击事件绑定完成');
        } else {
            console.error('登录按钮不存在');
        }
    </script>
</body>
</html>
