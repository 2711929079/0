<!DOCTYPE html>
<html>
<head>
    <title>按钮点击测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; }
        .test-btn {
            padding: 15px 40px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .test-btn:hover {
            background-color: #2980b9;
        }
        .log {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h2>按钮点击测试</h2>
    <button class="test-btn" onclick="testClick()">点击测试按钮</button>
    <div class="log" id="log"></div>

    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += message + '<br>';
            console.log(message);
        }

        function testClick() {
            log('=== 按钮被点击 ===');
            log('当前时间:', new Date().toLocaleTimeString());
            
            // 测试登录API
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: 'test123' })
            })
            .then(response => {
                log('响应状态:', response.status);
                return response.json();
            })
            .then(data => {
                log('响应数据:', JSON.stringify(data));
            })
            .catch(error => {
                log('错误:', error);
            });
        }

        // 页面加载时的调试信息
        window.onload = function() {
            log('=== 页面加载完成 ===');
            const button = document.querySelector('.test-btn');
            log('按钮元素:', button);
            
            if (button) {
                log('按钮存在，添加事件监听器');
                button.addEventListener('click', function() {
                    log('事件监听器触发');
                });
            }
        };
    </script>
</body>
</html>
